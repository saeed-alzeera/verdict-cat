<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Saeed Alzeera</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d23;
    --line: #2e3238;
    --ink: #e8eaed;
    --muted: #8b9099;
    --accent: #5b9bd5;
    --warn: #e8a730;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.45;
    min-height: 100vh;
  }

  /* ── Password overlay ── */
  #auth-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
  }
  #auth-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 36px 40px;
    width: 320px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  #auth-box h2 { font-size: 22px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  #auth-box p  { font-size: 13px; color: var(--muted); margin: 0 0 24px; }
  #auth-input {
    width: 100%; padding: 10px 14px;
    border: 1px solid var(--line); border-radius: 8px;
    font-size: 15px; outline: none; margin-bottom: 12px;
    background: var(--bg); color: var(--ink);
  }
  #auth-error { color: var(--warn); font-size: 13px; min-height: 18px; margin-bottom: 10px; }
  #auth-btn {
    width: 100%; padding: 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 500; cursor: pointer;
  }
  #auth-btn:hover { opacity: 0.88; }

  /* ── Hub ── */
  #hub {
    display: none;
    min-height: 100vh;
    align-items: center; justify-content: center;
    flex-direction: column;
    padding: 40px 20px;
  }
  #hub h1 { font-size: 20px; font-weight: 600; margin: 0 0 6px; letter-spacing: -0.01em; }
  #hub .sub { font-size: 13px; color: var(--muted); margin: 0 0 36px; }

  .hub-cards {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    width: 100%;
    max-width: 680px;
  }
  .hub-card {
    flex: 1 1 180px;
    max-width: 200px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 20px 24px;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--ink);
    transition: border-color 0.15s, transform 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .hub-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .hub-card .icon { font-size: 32px; line-height: 1; }
  .hub-card .label { font-size: 15px; font-weight: 600; }
  .hub-card .desc  { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<!-- Password overlay -->
<div id="auth-overlay">
  <div id="auth-box">
    <h2>Access Required</h2>
    <p>Enter password to continue</p>
    <input id="auth-input" type="password" placeholder="Password"
      onkeydown="if(event.key==='Enter')checkAuth()" autofocus />
    <div id="auth-error"></div>
    <button id="auth-btn" onclick="checkAuth()">Enter</button>
  </div>
</div>

<!-- Hub page -->
<div id="hub">
  <h1>Saeed Alzeera</h1>
  <p class="sub">Choose a section</p>
  <div class="hub-cards">
    <div class="hub-card" onclick="go('numbers.html')">
      <div class="icon">📊</div>
      <div class="label">Numbers</div>
      <div class="desc">Economic &amp; demographic data</div>
    </div>
    <div class="hub-card" onclick="go('library.html')">
      <div class="icon">📚</div>
      <div class="label">Ebook Reader</div>
      <div class="desc">Browse &amp; read books</div>
    </div>
    <div class="hub-card" onclick="go('admin.html')">
      <div class="icon">📤</div>
      <div class="label">EPUB Upload</div>
      <div class="desc">Manage your library</div>
    </div>
  </div>
</div>

<script>
  function checkAuth() {
    var val = document.getElementById('auth-input').value;
    if (val === '67DRA67') {
      document.getElementById('auth-overlay').style.display = 'none';
      document.getElementById('hub').style.display = 'flex';
    } else {
      document.getElementById('auth-error').textContent = 'Incorrect password.';
      document.getElementById('auth-input').value = '';
      document.getElementById('auth-input').focus();
    }
  }

  function go(page) {
    window.location.replace(page);
  }
</script>
</body>
</html>

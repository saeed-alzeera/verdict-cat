<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d23;
    --border: #2e3238;
    --text: #e8eaed;
    --muted: #8b9099;
    --accent: #5b9bd5;
    --card-hover: #1f2229;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  header {
    padding: 32px 40px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header .sub {
    font-size: 13px;
    color: var(--muted);
    flex: 1;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .hdr-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

  #import-file { display: none; }

  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    padding: 32px 40px;
    max-width: 1200px;
  }

  .book-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .book-card:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    transform: translateY(-2px);
  }

  .book-cover {
    width: 100%;
    aspect-ratio: 2/3;
    background: linear-gradient(145deg, #1e2330, #252c3a);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .book-cover::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(91,155,213,0.08) 0%, transparent 60%);
  }

  .book-cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 2px;
  }

  .book-cover-placeholder {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: center;
    line-height: 1.45;
    z-index: 1;
  }

  .book-cover-icon {
    font-size: 36px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.5;
  }

  .book-info {
    padding: 12px 14px 14px;
  }

  .book-info .title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.35;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .book-info .author {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .progress-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
  }

  .resume-label {
    font-size: 10px;
    color: var(--accent);
    margin-top: 6px;
    display: flex;
    align-items: center;
  }
</style>
</head>
<body>

<header>
  <h1>Library</h1>
  <span class="sub">Select a book to read</span>
  <div class="header-actions">
    <button class="hdr-btn" id="export-btn">Export progress</button>
    <button class="hdr-btn" id="import-btn">Import progress</button>
    <input type="file" id="import-file" accept=".json" />
  </div>
</header>

<div id="toast"></div>

<div id="grid"></div>

<script>
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2400);
  }

  // ── Export / Import progress ──────────────────────────────────────────────
  document.getElementById('export-btn').addEventListener('click', function() {
    var data = {};
    for (var i = 0; i < localStorage.length; i++) {
      var k = localStorage.key(i);
      if (k && k.startsWith('epub-progress:')) data[k] = localStorage.getItem(k);
    }
    if (!Object.keys(data).length) { showToast('No progress saved yet.'); return; }
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'verdict-cat-progress.json';
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('Progress exported.');
  });

  document.getElementById('import-btn').addEventListener('click', function() {
    document.getElementById('import-file').click();
  });

  document.getElementById('import-file').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        var count = 0;
        Object.keys(data).forEach(function(k) {
          if (k.startsWith('epub-progress:')) { localStorage.setItem(k, data[k]); count++; }
        });
        showToast('Restored progress for ' + count + ' book' + (count !== 1 ? 's' : '') + '.');
        // Refresh resume badges without a full reload
        document.querySelectorAll('.resume-label').forEach(function(el) { el.style.display = 'flex'; });
        renderCards();
      } catch(err) {
        showToast('Invalid file — could not restore.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ── Book catalogue ────────────────────────────────────────────────────────
  // Add new books here as they are uploaded.
  var BOOKS = [
    {
      slug: 'the-architects-apprentice',
      title: "The Architect's Apprentice",
      author: 'Elif Shafak',
      cover: null  // set to image URL if a cover is available
    }
  ];
  // ─────────────────────────────────────────────────────────────────────────

  var grid = document.getElementById('grid');

  function renderCards() {
    grid.innerHTML = '';
    BOOKS.forEach(function(book) {
      var hasSaved = !!localStorage.getItem('epub-progress:' + book.slug);

      var a = document.createElement('a');
      a.className = 'book-card';
      a.href = 'reader.html?book=' + encodeURIComponent(book.slug);

      var coverDiv = document.createElement('div');
      coverDiv.className = 'book-cover';

      if (book.cover) {
        var img = document.createElement('img');
        img.className = 'book-cover-img';
        img.src = book.cover;
        img.alt = book.title;
        coverDiv.appendChild(img);
      } else {
        var placeholder = document.createElement('div');
        placeholder.className = 'book-cover-placeholder';
        placeholder.innerHTML = '<span class="book-cover-icon">📖</span>' + book.title;
        coverDiv.appendChild(placeholder);
      }

      var infoDiv = document.createElement('div');
      infoDiv.className = 'book-info';
      infoDiv.innerHTML =
        '<div class="title">' + book.title + '</div>' +
        '<div class="author">' + book.author + '</div>' +
        (hasSaved ? '<div class="resume-label"><span class="progress-dot"></span>Resume reading</div>' : '');

      a.appendChild(coverDiv);
      a.appendChild(infoDiv);
      grid.appendChild(a);
    });
  }

  renderCards();
</script>
</body>
</html>

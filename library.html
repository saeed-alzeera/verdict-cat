<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Library</title>
<script src="gist.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d23;
    --border: #2e3238;
    --text: #e8eaed;
    --muted: #8b9099;
    --accent: #5b9bd5;
    --green: #4caf82;
    --card-hover: #1f2229;
  }

  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

  /* ── Header ── */
  header {
    padding: 28px 40px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  header .sub { font-size: 13px; color: var(--muted); flex: 1; }

  #sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--border);
    flex-shrink: 0;
  }
  .status-dot.connected { background: var(--green); }
  .status-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .hdr-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    padding: 5px 11px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Book grid ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    padding: 32px 40px;
    max-width: 1200px;
  }

  .book-card {
    display: block; text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: border-color 0.15s, background 0.15s, transform 0.15s;
  }
  .book-card:hover { border-color: var(--accent); background: var(--card-hover); transform: translateY(-2px); }

  .book-cover {
    width: 100%; aspect-ratio: 2/3;
    background: linear-gradient(145deg, #1e2330, #252c3a);
    display: flex; align-items: center; justify-content: center;
    padding: 16px; position: relative; overflow: hidden;
  }
  .book-cover::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(91,155,213,0.08) 0%, transparent 60%);
  }
  .book-cover-img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }
  .book-cover-placeholder { font-size: 13px; font-weight: 500; color: var(--text); text-align: center; line-height: 1.45; z-index: 1; }
  .book-cover-icon { font-size: 36px; display: block; margin-bottom: 12px; opacity: 0.5; }

  .book-info { padding: 12px 14px 14px; }
  .book-info .title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .book-info .author { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progress-dot { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .resume-label { font-size: 10px; color: var(--accent); margin-top: 6px; display: flex; align-items: center; }

  /* ── Setup modal ── */
  #setup-modal {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
  }
  #setup-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 40px;
    width: 420px;
    max-width: calc(100vw - 32px);
  }
  #setup-box h2 { font-size: 17px; font-weight: 600; margin-bottom: 6px; }
  #setup-box .setup-sub { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 22px; }
  .setup-steps { margin: 0 0 22px 18px; }
  .setup-steps li { font-size: 13px; color: var(--text); line-height: 1.7; }
  .setup-steps a { color: var(--accent); text-decoration: none; }
  .setup-steps a:hover { text-decoration: underline; }
  .setup-steps strong { color: var(--text); }
  #setup-pat {
    width: 100%; padding: 10px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px;
    font-family: monospace; outline: none; margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  #setup-pat:focus { border-color: var(--accent); }
  #setup-error { font-size: 12px; color: #e8a730; min-height: 18px; margin-bottom: 12px; }
  #setup-connect {
    width: 100%; padding: 10px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    margin-bottom: 8px;
    transition: opacity 0.15s;
  }
  #setup-connect:disabled { opacity: 0.5; cursor: default; }
  #setup-skip {
    width: 100%; padding: 8px;
    background: none; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-size: 13px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  #setup-skip:hover { border-color: var(--muted); color: var(--text); }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px;
    font-size: 13px; color: var(--text);
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; z-index: 100;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Setup modal (shown on first visit) -->
<div id="setup-modal" style="display:none;">
  <div id="setup-box">
    <h2>Sync reading progress</h2>
    <p class="setup-sub">Progress is saved to a private GitHub Gist — invisible to others, works on every device, survives browser resets.</p>
    <ol class="setup-steps">
      <li>Open <a href="https://github.com/settings/tokens/new?scopes=gist&description=verdict-cat" target="_blank">github.com/settings/tokens</a></li>
      <li>Generate a token with only the <strong>gist</strong> scope</li>
      <li>Paste it below</li>
    </ol>
    <input id="setup-pat" type="password" placeholder="ghp_…" autocomplete="off" />
    <div id="setup-error"></div>
    <button id="setup-connect">Connect</button>
    <button id="setup-skip">Skip — use this device only</button>
  </div>
</div>

<header>
  <h1>Library</h1>
  <span class="sub">Select a book to read</span>
  <div id="sync-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-label">Not synced</span>
  </div>
  <button class="hdr-btn" id="disconnect-btn" style="display:none;">Disconnect</button>
</header>

<div id="grid"></div>
<div id="toast"></div>

<script>
  // ── Book catalogue ────────────────────────────────────────────────────────
  // Add new books here as they are uploaded.
  var BOOKS = [
    {
      slug: 'the-architects-apprentice',
      title: "The Architect's Apprentice",
      author: 'Elif Shafak',
      cover: null
    }
  ];
  // ─────────────────────────────────────────────────────────────────────────

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2400);
  }

  function setSyncStatus(state) {
    var dot   = document.getElementById('status-dot');
    var label = document.getElementById('status-label');
    dot.className = 'status-dot ' + (state === 'connected' ? 'connected' : state === 'syncing' ? 'syncing' : '');
    label.textContent = state === 'connected' ? 'Synced' : state === 'syncing' ? 'Syncing…' : 'Not synced';
    document.getElementById('disconnect-btn').style.display = state === 'connected' ? '' : 'none';
  }

  function renderCards() {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    BOOKS.forEach(function(book) {
      var hasSaved = !!localStorage.getItem('epub-progress:' + book.slug);
      var a = document.createElement('a');
      a.className = 'book-card';
      a.href = 'reader.html?book=' + encodeURIComponent(book.slug);
      var coverDiv = document.createElement('div');
      coverDiv.className = 'book-cover';
      if (book.cover) {
        var img = document.createElement('img');
        img.className = 'book-cover-img'; img.src = book.cover; img.alt = book.title;
        coverDiv.appendChild(img);
      } else {
        var ph = document.createElement('div');
        ph.className = 'book-cover-placeholder';
        ph.innerHTML = '<span class="book-cover-icon">📖</span>' + book.title;
        coverDiv.appendChild(ph);
      }
      var info = document.createElement('div');
      info.className = 'book-info';
      info.innerHTML =
        '<div class="title">' + book.title + '</div>' +
        '<div class="author">' + book.author + '</div>' +
        (hasSaved ? '<div class="resume-label"><span class="progress-dot"></span>Resume reading</div>' : '');
      a.appendChild(coverDiv); a.appendChild(info);
      grid.appendChild(a);
    });
  }

  // ── Setup modal ───────────────────────────────────────────────────────────
  function showSetup() {
    document.getElementById('setup-modal').style.display = 'flex';
    document.getElementById('setup-pat').focus();
  }

  document.getElementById('setup-pat').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('setup-connect').click();
  });

  document.getElementById('setup-connect').addEventListener('click', async function() {
    var pat = document.getElementById('setup-pat').value.trim();
    var errEl = document.getElementById('setup-error');
    var btn = document.getElementById('setup-connect');
    if (!pat) { errEl.textContent = 'Paste your token first.'; return; }
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Connecting…';
    try {
      var gistId = await Gist.connect(pat);
      Gist.save(pat, gistId);
      document.getElementById('setup-modal').style.display = 'none';
      await syncFromGist();
    } catch(err) {
      errEl.textContent = err.message || 'Connection failed. Check the token and try again.';
      btn.disabled = false;
      btn.textContent = 'Connect';
    }
  });

  document.getElementById('setup-skip').addEventListener('click', function() {
    document.getElementById('setup-modal').style.display = 'none';
    renderCards();
  });

  // ── Disconnect ────────────────────────────────────────────────────────────
  document.getElementById('disconnect-btn').addEventListener('click', function() {
    if (!confirm('Disconnect GitHub sync? Your local progress stays on this device.')) return;
    Gist.clear();
    setSyncStatus('none');
    renderCards();
  });

  // ── Sync on load ──────────────────────────────────────────────────────────
  async function syncFromGist() {
    setSyncStatus('syncing');
    await Gist.pull();
    setSyncStatus('connected');
    renderCards();
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  if (Gist.isConnected()) {
    syncFromGist();
  } else {
    var skippedBefore = sessionStorage.getItem('setup-skipped');
    if (skippedBefore) {
      renderCards();
    } else {
      renderCards(); // render immediately, then show modal
      showSetup();
    }
  }

  document.getElementById('setup-skip').addEventListener('click', function() {
    sessionStorage.setItem('setup-skipped', '1');
  }, { once: true });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reader</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png" />
<link rel="shortcut icon" href="favicon.ico" />
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script src="gist.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d23;
    --border: #2e3238;
    --text: #e8eaed;
    --muted: #8b9099;
    --accent: #5b9bd5;
    --bar-h: 52px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    z-index: 100;
  }

  #back-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    white-space: nowrap;
    flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s;
  }
  #back-btn:hover { color: var(--accent); border-color: var(--accent); }

  #book-title {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #progress-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }

  #chapter-time {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    padding-left: 4px;
    border-left: 1px solid var(--border);
  }

  #font-size-label {
    font-size: 11px;
    color: var(--muted);
    min-width: 32px;
    text-align: center;
  }

  #progress-bar {
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  #viewer-wrap {
    position: fixed;
    top: var(--bar-h);
    left: 60px;
    right: 60px;
    bottom: var(--bar-h);
  }

  #viewer { width: 100%; height: 100%; }

  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    z-index: 50;
  }
  .nav-btn:hover { background: #252830; border-color: var(--accent); }
  #prev-btn { left: 8px; }
  #next-btn { right: 8px; }

  #bottombar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 100;
  }

  .bar-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .bar-btn:hover { border-color: var(--accent); color: var(--accent); }

  #saved-badge {
    font-size: 11px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.4s;
  }
  #saved-badge.show { opacity: 1; }

  #toc-panel {
    position: fixed;
    top: var(--bar-h);
    left: 0;
    bottom: var(--bar-h);
    width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    z-index: 90;
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    padding: 12px 0;
  }
  #toc-panel.open { transform: translateX(0); }
  #toc-panel h3 {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 16px 8px;
  }
  #toc-list { list-style: none; }
  #toc-list li a {
    display: block;
    padding: 7px 16px;
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    transition: background 0.12s;
  }
  #toc-list li a:hover { background: rgba(91,155,213,0.12); color: var(--accent); }
  #toc-list li a.active { color: var(--accent); background: rgba(91,155,213,0.08); }

  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    z-index: 200;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { font-size: 13px; color: var(--muted); }

  #error-msg {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 10px;
    z-index: 200;
  }
  #error-msg p { font-size: 14px; color: var(--muted); text-align: center; padding: 0 24px; }
  #error-msg a { color: var(--accent); text-decoration: none; font-size: 13px; }

  #tap-zone { display: none; }

  /* ── Mobile reader mode ──────────────────────────────────────────────────── */
  @media (max-width: 768px) {
    html, body { background: #000 !important; }

    #tap-zone {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    #prev-btn, #next-btn { display: none !important; }

    #viewer-wrap {
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
    }

    #toc-panel { top: 0 !important; bottom: 0 !important; }

    /* Top bar: hidden above viewport by default, slides down on reveal */
    #topbar {
      transform: translateY(-100%);
      transition: transform 0.22s ease;
      background: rgba(0, 0, 0, 0.93) !important;
      border-bottom-color: rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(10px);
    }
    #topbar.mob-ui-visible { transform: translateY(0); }

    /* Bottom bar: repositioned below topbar, hidden above viewport by default */
    #bottombar {
      top: var(--bar-h);
      bottom: auto;
      transform: translateY(-200%);
      transition: transform 0.22s ease;
      background: rgba(0, 0, 0, 0.93) !important;
      border-top: none !important;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
      backdrop-filter: blur(10px);
    }
    #bottombar.mob-ui-visible { transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Loading book…</div>
</div>

<div id="error-msg">
  <p id="error-detail">Could not load the book.</p>
</div>

<div id="topbar">
  <a id="back-btn" href="library.html">&#8592; Library</a>
  <span id="book-title">—</span>
  <div id="progress-wrap">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <span id="progress-label">—</span>
    <span id="chapter-time"></span>
  </div>
</div>

<button id="prev-btn" class="nav-btn" title="Previous page">&#8592;</button>

<div id="viewer-wrap">
  <div id="viewer"></div>
</div>

<div id="tap-zone"></div>

<button id="next-btn" class="nav-btn" title="Next page">&#8594;</button>

<div id="bottombar">
  <button class="bar-btn" id="toc-toggle">Contents</button>
  <button class="bar-btn" id="font-dec">A&#8722;</button>
  <span id="font-size-label">160%</span>
  <button class="bar-btn" id="font-inc">A+</button>
  <button class="bar-btn" id="theme-toggle">Light / Dark</button>
  <span id="saved-badge">Saved</span>
</div>

<div id="toc-panel">
  <h3>Contents</h3>
  <ul id="toc-list"></ul>
</div>

<script>
  var isMobile = window.matchMedia('(max-width: 768px)').matches;

  // ââ Book catalogue (slug â raw GitHub URL) ââââââââââââââââââââââââââââââââ
  var BOOKS = {
    'the-architects-apprentice': {
      url: 'https://raw.githubusercontent.com/saeed-alzeera/verdict-cat/main/books/the-architects-apprentice.epub',
      title: 'The Architect\'s Apprentice',
      author: 'Elif Shafak'
    },
    "empire-of-the-vampire-empire-of-the-z-library-sk-1lib-sk": {
      url: "https://raw.githubusercontent.com/saeed-alzeera/verdict-cat/main/books/empire-of-the-vampire-empire-of-the-z-library-sk-1lib-sk.epub",
      title: "Empire of the Vampire",
      author: "Jay Kristoff"
    }
  };
  // âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ

  var params = new URLSearchParams(location.search);
  var slug = params.get('book');
  var bookMeta = slug && BOOKS[slug];

  function storageKey() { return 'epub-progress:' + slug; }

  var lastGistChapter = null;
  var gistIdleTimer   = null;

  function saveProgress(cfi) {
    try { localStorage.setItem(storageKey(), cfi); } catch(e) {}
    var badge = document.getElementById('saved-badge');
    badge.classList.add('show');
    setTimeout(function() { badge.classList.remove('show'); }, 1200);
  }

  function loadProgress() {
    try { return localStorage.getItem(storageKey()); } catch(e) { return null; }
  }

  // Push to Gist: immediately on chapter change, debounced (30s) within a chapter
  function scheduleGistPush(immediate) {
    clearTimeout(gistIdleTimer);
    if (immediate) { Gist.push(); }
    else { gistIdleTimer = setTimeout(function() { Gist.push(); }, 30000); }
  }

  window.addEventListener('beforeunload', function() { Gist.push(); });

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    var el = document.getElementById('error-msg');
    el.style.display = 'flex';
    document.getElementById('error-detail').textContent = msg || 'Could not load the book.';
  }

  if (!bookMeta) {
    showError('Unknown book. Please select a book from the library.');
  } else {
    document.getElementById('book-title').textContent = bookMeta.title;
    document.title = bookMeta.title;

    var book = ePub(bookMeta.url);
    var rendition = book.renderTo('viewer', { width: '100%', height: '100%', spread: isMobile ? 'none' : 'always' });
    var fontSize = isMobile ? 140 : 160;
    var darkMode = true;
    var chapterWordCounts = {};

    function countWordsInDoc(doc) {
      var text = doc.body ? (doc.body.innerText || doc.body.textContent || '') : '';
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function applyTheme() {
      var darkBg = isMobile ? '#000000' : '#0f1117';
      rendition.themes.override('background', darkMode ? darkBg : '#fafafa');
      rendition.themes.override('color',      darkMode ? '#e8eaed' : '#1a1a1a');
      rendition.themes.override('line-height', '1.7');
      document.body.style.background = darkMode ? darkBg : '#f0f0f0';
    }

    var savedCfi = loadProgress();
    var lastKnownCfi = savedCfi || null;
    var displayPromise = savedCfi ? rendition.display(savedCfi) : rendition.display();

    displayPromise.then(function() {
      document.getElementById('loading').style.display = 'none';
      rendition.themes.fontSize(fontSize + '%');
      document.getElementById('font-size-label').textContent = fontSize + '%';
      applyTheme();
    }).catch(function() {
      // Saved CFI might be stale; fall back to beginning
      rendition.display().then(function() {
        document.getElementById('loading').style.display = 'none';
        applyTheme();
      }).catch(function(err) {
        showError('Failed to render book: ' + (err && err.message));
      });
    });

    function updateProgressBar(cfi) {
      var pct = book.locations.percentageFromCfi(cfi);
      if (pct !== undefined && !isNaN(pct) && pct > 0) {
        document.getElementById('progress-fill').style.width = (pct * 100).toFixed(1) + '%';
        document.getElementById('progress-label').textContent = Math.round(pct * 100) + '%';
      }
    }

    // Save progress on every page turn; push to Gist on chapter change or after 30s idle
    rendition.on('relocated', function(loc) {
      if (!loc || !loc.start) return;
      lastKnownCfi = loc.start.cfi;
      saveProgress(loc.start.cfi);
      var chapterChanged = loc.start.href !== lastGistChapter;
      if (chapterChanged) lastGistChapter = loc.start.href;
      scheduleGistPush(chapterChanged);

      // Update progress bar (may be a no-op if locations aren't generated yet;
      // book.ready.then handles the re-apply after generation)
      updateProgressBar(loc.start.cfi);

      // Minutes left in chapter
      var chapterHref = loc.start.href ? loc.start.href.split('#')[0] : '';
      var posInChapter = (loc.start.percentage !== undefined && !isNaN(loc.start.percentage))
        ? loc.start.percentage : 0;
      try {
        var contents = rendition.getContents();
        if (contents && contents.length > 0 && contents[0].document) {
          if (!chapterWordCounts[chapterHref]) {
            chapterWordCounts[chapterHref] = countWordsInDoc(contents[0].document);
          }
          var totalWords = chapterWordCounts[chapterHref] || 0;
          if (totalWords > 0) {
            var wordsLeft = Math.round(totalWords * (1 - posInChapter));
            var minsLeft = Math.ceil(wordsLeft / 250);
            document.getElementById('chapter-time').textContent =
              minsLeft <= 1 ? '< 1 min left' : minsLeft + ' min left';
          }
        }
      } catch(e) {}

      // Highlight active TOC entry (strip fragment from both sides before comparing)
      var locBase = loc.start.href ? loc.start.href.split('#')[0] : '';
      document.querySelectorAll('#toc-list li a').forEach(function(a) {
        a.classList.toggle('active', a.dataset.hrefBase === locBase);
      });
    });

    book.ready.then(function() {
      return book.locations.generate(1000);
    }).then(function() {
      // Locations are now available; re-apply progress in case the initial
      // relocated event fired before generation completed (showing 0%)
      if (lastKnownCfi) updateProgressBar(lastKnownCfi);
    }).catch(function() {});

    book.loaded.navigation.then(function(nav) {
      var list = document.getElementById('toc-list');

      function addTocItems(items, container, depth) {
        items.forEach(function(item) {
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#';
          a.textContent = item.label.trim();
          a.dataset.href = item.href;
          a.dataset.hrefBase = item.href ? item.href.split('#')[0] : '';
          if (depth > 0) {
            a.style.paddingLeft = (16 + depth * 14) + 'px';
            a.style.fontSize = '12px';
            a.style.color = 'var(--muted)';
          }
          a.addEventListener('click', function(e) {
            e.preventDefault();
            rendition.display(item.href);
            document.getElementById('toc-panel').classList.remove('open');
          });
          li.appendChild(a);
          container.appendChild(li);
          if (item.subitems && item.subitems.length) {
            addTocItems(item.subitems, container, depth + 1);
          }
        });
      }

      addTocItems(nav.toc, list, 0);
    });

    document.getElementById('prev-btn').addEventListener('click', function() { rendition.prev(); });
    document.getElementById('next-btn').addEventListener('click', function() { rendition.next(); });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft')  rendition.prev();
      if (e.key === 'ArrowRight') rendition.next();
    });
    // ── Mobile tap navigation ─────────────────────────────────────────────────
    if (isMobile) {
      var tapZone = document.getElementById('tap-zone');
      var tzStart = {};
      tapZone.addEventListener('touchstart', function(e) {
        tzStart.t = Date.now();
        tzStart.x = e.touches[0].clientX;
        tzStart.y = e.touches[0].clientY;
      }, { passive: true });
      tapZone.addEventListener('touchend', function(e) {
        var dx = e.changedTouches[0].clientX - tzStart.x;
        var dy = e.changedTouches[0].clientY - tzStart.y;
        if (Math.abs(dx) > 20 || Math.abs(dy) > 20) return;
        if (Date.now() - tzStart.t >= 500) return;
        if (tzStart.y < window.innerHeight * 0.15) {
          toggleMobileControls();
        } else if (tzStart.x < window.innerWidth / 2) {
          rendition.prev();
        } else {
          rendition.next();
        }
      });
    }

    document.getElementById('font-inc').addEventListener('click', function() {
      fontSize = Math.min(fontSize + 10, 200);
      rendition.themes.fontSize(fontSize + '%');
      document.getElementById('font-size-label').textContent = fontSize + '%';
    });
    document.getElementById('font-dec').addEventListener('click', function() {
      fontSize = Math.max(fontSize - 10, 60);
      rendition.themes.fontSize(fontSize + '%');
      document.getElementById('font-size-label').textContent = fontSize + '%';
    });
    document.getElementById('theme-toggle').addEventListener('click', function() {
      darkMode = !darkMode;
      applyTheme();
    });
  }


  // ---- Mobile controls reveal ----
  var mobUiTimer = null;
  window.toggleMobileControls = function() {
    var topbar = document.getElementById('topbar');
    var bottombar = document.getElementById('bottombar');
    var visible = topbar.classList.contains('mob-ui-visible');
    clearTimeout(mobUiTimer);
    if (visible) {
      topbar.classList.remove('mob-ui-visible');
      bottombar.classList.remove('mob-ui-visible');
    } else {
      topbar.classList.add('mob-ui-visible');
      bottombar.classList.add('mob-ui-visible');
      mobUiTimer = setTimeout(function() {
        topbar.classList.remove('mob-ui-visible');
        bottombar.classList.remove('mob-ui-visible');
      }, 3000);
    }
  };
  document.getElementById('toc-toggle').addEventListener('click', function() {
    document.getElementById('toc-panel').classList.toggle('open');
  });
</script>
</body>
</html>

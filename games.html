<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Games — Saeed Alzeera</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png"/>
<link rel="shortcut icon" href="favicon.ico"/>
<style>
  :root {
    --bg: #0f1117; --panel: #1a1d23; --line: #2e3238;
    --ink: #e8eaed; --muted: #8b9099; --accent: #5b9bd5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.45; min-height: 100vh;
  }

  /* top bar */
  #hub-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 48px; display: flex; align-items: center;
    justify-content: space-between; padding: 0 20px; z-index: 500;
  }
  #hub-bar a {
    color: var(--muted); text-decoration: none; font-size: 13px;
  }
  #hub-bar a:hover { color: var(--ink); }

  /* hub body */
  #hub {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; padding: 80px 20px 40px;
  }
  #hub h1 { font-size: 22px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.01em; }
  #hub .sub { font-size: 13px; color: var(--muted); margin: 0 0 36px; }

  .hub-cards {
    display: flex; flex-wrap: wrap; gap: 16px;
    justify-content: center; width: 100%; max-width: 680px;
  }
  .hub-card {
    flex: 1 1 180px; max-width: 200px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 12px; padding: 28px 20px 24px;
    text-align: center; cursor: pointer; text-decoration: none;
    color: var(--ink); transition: border-color .15s, transform .15s;
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .hub-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .hub-card .icon  { font-size: 32px; line-height: 1; }
  .hub-card .label { font-size: 15px; font-weight: 600; }
  .hub-card .desc  { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>

<div id="hub-bar">
  <a href="index.html">← Hub</a>
</div>

<div id="hub">
  <h1>Games Games Games</h1>
  <p class="sub">Pick a game</p>
  <div class="hub-cards">
    <div class="hub-card" onclick="go('games/klondike/')">
      <div class="icon">🃏</div>
      <div class="label">Klondike</div>
      <div class="desc">Classic solitaire card game</div>
    </div>
  </div>
</div>

<script>
(function() {
  if (localStorage.getItem('hub_auth') !== '1') {
    window.location.replace('index.html');
  }
})();

function go(page) { window.location.href = page; }
</script>
</body>
</html>

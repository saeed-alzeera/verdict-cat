<style>
  :root {
    --bg: #0f1117;

  }
  html.light {
    --bg: #f7f7f5;
    --panel: #ffffff;
    --panel-alt: #fafbfc;
    --row-alt: #fcfcfb;
    --ink: #111317;
    --muted: #5b6470;
    --line: #e3e6ea;
    --accent: #1f4e79;
    --warn: #b25e00;
    --na: #9aa0a6;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px; line-height: 1.45; -webkit-text-size-adjust: 100%; }
  header { padding: 16px 16px 8px; display: flex; gap: 12px; align-items: center; }
  header > div { flex: 1; }
  #hub-back {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 13px; color: var(--muted);
    text-decoration: none; padding: 6px 10px;
    border: 1px solid var(--line); border-radius: 8px;
    white-space: nowrap; flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s;
  }
  #hub-back:hover { color: var(--ink); border-color: var(--muted); }
  #theme-toggle { background: transparent; color: var(--muted); border: 1px solid var(--line);
    border-radius: 8px; padding: 6px 10px; font-size: 18px; cursor: pointer; min-height: unset;

<header>
  <a id="hub-back" href="#" onclick="sessionStorage.removeItem('hub_auth'); window.location.replace('index.html'); return false;">&#8592; Hub</a>
  <div>
    <h1>Saeed Alzeera's Numbers</h1>
    <div class="sub">Live data: World Bank &amp; IMF · time range 2020–latest</div>
  </div>
  <button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">&#9728;</button>
</header>
<main>
  <div class="controls">
    <label for="country">Country</label>
    <select id="country" disabled><option>Loading countries…</option></select>
    <button id="refresh" disabled>Refresh</button>
  </div>
  <div class="meta">
    <span id="status">Idle</span>
    <span id="fetched"></span>
  </div>
  <table>
    <thead>
      <tr>
        <th>Indicator</th>
        <th>Unit</th>
        <th>Source</th>
        <th>Latest year</th>
        <th style="text-align:right">Value</th>
      </tr>
    </thead>
    <tbody id="rows">
      <tr><td colspan="5" class="loader">Select a country to load data.</td></tr>
    </tbody>
  </table>
  <section id="exports" class="exports" aria-label="Indicator strings">
    <div class="export-row">
      <p id="exportLine1" class="export-line"></p>
      <button class="copy-btn" onclick="copyLine('exportLine1', this)">Copy</button>
      <button class="copy-btn" onclick="copySourcesLine(EXPORT_LINE_1, this)">Copy sources</button>
    </div>
    <div class="export-row">

const $ = (sel) => document.querySelector(sel);
const rowsEl = $("#rows");
const statusEl = $("#status");
const fetchedEl = $("#fetched");
const countryEl = $("#country");
const refreshEl = $("#refresh");

function setStatus(msg) { statusEl.textContent = msg; }
function setFetched() { fetchedEl.textContent = `Fetched ${new Date().toLocaleString()}`; }

function displayNameFor(wbName) {
  if (COUNTRY_DISPLAY_OVERRIDES[wbName]) return { name: COUNTRY_DISPLAY_OVERRIDES[wbName], flagged: false };
  const awkward = /,|Rep\.|^St\./.test(wbName);
  return { name: wbName, flagged: awkward };
}

async function loadCountries() {
  setStatus("Loading country list…");
  const url = "https://api.worldbank.org/v2/country?format=json&per_page=400";
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Country list fetch failed: ${res.status}`);
  const json = await res.json();
  const countries = json[1]
    .filter((c) => c.region && c.region.id !== "NA")
    .map((c) => {
      const { name, flagged } = displayNameFor(c.name);
      return { iso3: c.id, wbName: c.name, displayName: name, flagged };
    })
    .sort((a, b) => a.displayName.localeCompare(b.displayName));
  return countries;
}

function populateCountrySelect(countries) {
  countryEl.innerHTML = "";
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "— Select country —";
  countryEl.appendChild(placeholder);
  for (const c of countries) {
    const opt = document.createElement("option");
    opt.value = c.iso3;
    opt.textContent = c.flagged ? `⚠ ${c.displayName}` : c.displayName;
    countryEl.appendChild(opt);
  }
  countryEl.disabled = false;
  refreshEl.disabled = false;
}

async function fetchWB(iso3, code) {
  const url = `https://api.worldbank.org/v2/country/${iso3}/indicator/${code}` +
              `?format=json&per_page=200&date=${START_YEAR}:2035`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`WB ${code} HTTP ${res.status}`);
  const json = await res.json();
  if (!Array.isArray(json) || !Array.isArray(json[1])) return [];
  return json[1]
    .filter((r) => r.value !== null && r.value !== undefined)
    .map((r) => ({ year: Number(r.date), value: Number(r.value) }))
    .sort((a, b) => b.year - a.year);
}

const IMF_LATEST_YEAR = 2025;

async function fetchIMF(iso3, code) {
  const series = IMF_DATA[code] && IMF_DATA[code][iso3];
  if (!series) return [];
  return Object.entries(series)
    .map(([y, v]) => ({ year: Number(y), value: Number(v) }))
    .filter((p) => Number.isFinite(p.value) && p.year <= IMF_LATEST_YEAR)
    .sort((a, b) => b.year - a.year);
}

function latestPoint(series) { return series && series.length ? series[0] : null; }

  const tr = rowsEl.children[i];

  tr.children[4].innerHTML = `<span class="${klass || ""}">${valueText}</span>`;

function buildExportLine(spec) {
  return spec.map(({ idx, label }) => `${label}: ${latestValues[idx] ?? "N/A"}`).join(" | ");
}

function renderExportLines() {
  const l1 = document.getElementById("exportLine1");

}

function copySourcesLine(spec, btn) {
  const text = spec.map(({ idx }) => INDICATORS[idx].sourceUrl(currentIso3)).join("\n");
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => { btn.textContent = "Copy sources"; }, 1500);
  });
}

function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('theme-toggle').textContent = isLight ? '☽' : '☀';
}

async function loadCountryData(iso3) {
  if (!iso3) return;
  currentIso3 = iso3;
  setStatus("Fetching data…");
  renderSkeleton();

  await Promise.all(INDICATORS.map(async (ind, idx) => {
    try {
      let point = null;
      if (ind.api === "wb") {
        point = latestPoint(await fetchWB(iso3, ind.code));
      } else if (ind.api === "imf") {
        point = latestPoint(await fetchIMF(iso3, ind.code));
      } else if (ind.api === "bop") {
        const series = BOP_DATA[iso3];
        if (series) {
          const years = Object.keys(series).map(Number).sort((a,b) => b - a);
          if (years.length) point = { year: years[0], value: series[String(years[0])] };
        }
      } else if (ind.api === "static_eodb") {
        if (EODB_2020[iso3] !== undefined) {
          point = { year: 2020, value: EODB_2020[iso3] };
        }
      }

      if (point) {
        renderRow(idx, { year: point.year, valueText: ind.format(point.value) });
      } else {
        renderRow(idx, {
          year: null,
          valueText: ind.api === "static_eodb" ? "Not in lookup" : "N/A",
          klass: "na"
        });
      }
    } catch (err) {
      console.warn(`[${ind.name}]`, err);
      renderRow(idx, { year: null, valueText: "Data unavailable", klass: "err" });
    }
  }));

  setStatus("Ready");
  setFetched();
}

(async function init() {
  try {
    const countries = await loadCountries();
    populateCountrySelect(countries);
    const flaggedCount = countries.filter((c) => c.flagged).length;
    setStatus(`Ready — ${countries.length} countries loaded` +
      (flaggedCount ? ` · ${flaggedCount} flagged ⚠ for display-name review` : ""));
  } catch (err) {
    setStatus("Failed to load country list — check connection and refresh.");
    console.error(err);
    return;
  }

  countryEl.addEventListener("change", (e) => {
    const iso3 = e.target.value;
    if (iso3) loadCountryData(iso3);
  });
  refreshEl.addEventListener("click", () => {
    const iso3 = countryEl.value;
    if (iso3) loadCountryData(iso3);
  });
})();
</script>
